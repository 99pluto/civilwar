<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;overflow:hidden;display:flex;flex-direction:column}

<script>
// ═══════════════════════════════════════════
// 0. 모바일 뷰포트 높이 수정 (iOS Safari 등)
// ═══════════════════════════════════════════
function setAppHeight() {
  document.body.style.height = window.innerHeight + 'px';
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('load', setAppHeight);

// ═══════════════════════════════════════════
// 1. 데이터 파일(korean_politicians_data.js)에서 로드
// ═══════════════════════════════════════════
if (!window.POLITICIANS_DATA) {
  document.body.innerHTML = '<div style="color:#ef4444;padding:40px;text-align:center;font-size:1rem">' +
    '⚠️ 데이터 파일을 불러올 수 없습니다.<br>' +
    '<small style="color:#8b949e">korean_politicians_data.js 파일이 같은 폴더에 있는지 확인하세요.</small></div>';
  throw new Error('POLITICIANS_DATA not loaded');
}

const NODES        = window.POLITICIANS_DATA.nodes;
const LINKS        = window.POLITICIANS_DATA.links;
const POLITICIAN_DB = window.POLITICIANS_DATA.politicianDB;

// ═══════════════════════════════════════════
// 2. 연결수 기반 노드 크기 계산
// ═══════════════════════════════════════════
function calcDegrees() {
  const deg = {};
  NODES.forEach(n => { deg[n.id] = 0; });
  LINKS.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s !== undefined && deg[s] !== undefined) deg[s]++;
    if (t !== undefined && deg[t] !== undefined) deg[t]++;
  });
  const maxDeg = Math.max(...Object.values(deg), 1);
  const SZ_MIN = 22, SZ_MAX = 58;
  NODES.forEach(n => {
    n._degree = deg[n.id] || 1;
    n.size = Math.round(SZ_MIN + (SZ_MAX - SZ_MIN) * (n._degree / maxDeg));
  });
}
calcDegrees();

// ═══════════════════════════════════════════
// 3. D3 초기화
// ═══════════════════════════════════════════
const svg  = d3.select('#network-svg');
const cont = document.getElementById('graph-container');
let W = cont.clientWidth, H = cont.clientHeight;

NODES.forEach(n => { n.x = (n.ix || .5) * W; n.y = (n.iy || .5) * H; });

const defs = svg.append('defs');

function addGlow(id, blur) {
  const f = defs.append('filter').attr('id', `glow-${id}`)
    .attr('x','-70%').attr('y','-70%').attr('width','240%').attr('height','240%');
  f.append('feGaussianBlur').attr('stdDeviation', blur || 6).attr('result','blur');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
}
NODES.forEach(n => addGlow(n.id, n.size > 45 ? 10 : 6));

function addGradient(i, color) {
  const g = defs.append('linearGradient').attr('id', `lg-${i}`).attr('gradientUnits','userSpaceOnUse');
  g.append('stop').attr('offset','0%').attr('stop-color', color).attr('stop-opacity', .9);
  g.append('stop').attr('offset','100%').attr('stop-color', color).attr('stop-opacity', .35);
}
LINKS.forEach((l, i) => addGradient(i, l.color));

const root = svg.append('g');

let currentK = 0.65;
const ROLE_THRESH = 0.5;
const LINK_THRESH = 0.70;

function updateLabelVisibility(k) {
  currentK = k;
  const rOpacity = k >= ROLE_THRESH ? Math.min(1, (k - ROLE_THRESH) * 5) : 0;
  const lOpacity = k >= LINK_THRESH ? Math.min(1, (k - LINK_THRESH) * 7) : 0;
  root.selectAll('.node-sublabel').style('opacity', rOpacity);
  root.selectAll('.node-period').style('opacity', rOpacity * 0.75);
  if (selectedNodeId && linkLabelsSel) {
    const conn = getConnectedNodeIds(selectedNodeId);
    linkLabelsSel.style('opacity', d => {
      const s = typeof d.source === 'object' ? d.source.id : d.source;
      const t = typeof d.target === 'object' ? d.target.id : d.target;
      return (conn.has(s) && conn.has(t)) ? lOpacity : 0;
    });
  } else {
    root.selectAll('.link-label').style('opacity', lOpacity);
  }
  document.getElementById('zoom-level').textContent = Math.round(k * 100) + '%';
}

const zoomBehavior = d3.zoom()
  .scaleExtent([0.05, 6])
  .on('zoom', event => {
    root.attr('transform', event.transform);
    updateLabelVisibility(event.transform.k);
  });

svg.call(zoomBehavior).on('dblclick.zoom', null);
svg.on('mousedown.cursor', () => svg.classed('dragging', true));
svg.on('mouseup.cursor mouseleave.cursor', () => svg.classed('dragging', false));

function fitGraph() {
  const xs = NODES.map(n => n.x).filter(x => x != null);
  const ys = NODES.map(n => n.y).filter(y => y != null);
  if (!xs.length) return;
  const pad = 70;
  const x0 = Math.min(...xs) - 60, x1 = Math.max(...xs) + 60;
  const y0 = Math.min(...ys) - 60, y1 = Math.max(...ys) + 60;
  const dx = x1 - x0 || 1, dy = y1 - y0 || 1;
  const scale = Math.min((W - pad * 2) / dx, (H - pad * 2) / dy, 1.5);
  const tx = W / 2 - scale * (x0 + dx / 2);
  const ty = H / 2 - scale * (y0 + dy / 2);
  svg.transition().duration(700).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ── 패널 로직
const panel    = document.getElementById('info-panel');
const overlay  = document.getElementById('overlay');
const closeBtn = document.getElementById('close-btn');
const panelHdr = document.getElementById('panel-header-content');
const panelBody = document.getElementById('panel-body');

function openPanel()  { panel.classList.add('open');  overlay.classList.add('active'); }
function closePanel() { panel.classList.remove('open'); overlay.classList.remove('active'); clearHighlight(); }
closeBtn.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

function showPersonPanel(node) {
  panelHdr.innerHTML = `<span class="panel-type-badge badge-person">인물 정보</span>
    <div class="panel-title" style="color:${node.color}">${node.name}</div>
    <div class="panel-subtitle">${node.role} | ${node.period}</div>`;
  let html = `<div class="section-title">📋 주요 사건 · 이력</div>`;
  (node.events || []).forEach(e => {
    const s = (e.sources || []).map(s =>
      `<a class="source-link" href="${s.url}" target="_blank">🔗 ${s.label}</a>`).join('');
    html += `<div class="event-card" style="border-left-color:${e.color}">
      <div class="event-date">${e.date}</div>
      <div class="event-title">${e.title}</div>
      <div class="event-desc">${e.desc}</div>
      <div class="source-list">${s}</div></div>`;
  });
  if (node._degree) {
    html += `<div class="section-title">📊 네트워크 정보</div>
      <div class="relation-block"><p style="font-size:.78rem;color:#c9d1d9">연결된 인물 수: <strong style="color:#58a6ff">${node._degree}명</strong></p></div>`;
  }
  panelBody.innerHTML = html;
  openPanel();
}

function showRelationPanel(link) {
  const src = NODES.find(n => n.id === (link.source.id || link.source));
  const tgt = NODES.find(n => n.id === (link.target.id || link.target));
  if (!src || !tgt) return;
  const r = link.relation || {};
  panelHdr.innerHTML = `<span class="panel-type-badge badge-relation">관계 정보</span>
    <div class="panel-title">${src.name} ↔ ${tgt.name}</div>
    <div class="panel-subtitle">${link.label || ''}</div>`;
  const chips = [src, tgt].map(n =>
    `<span class="person-chip" style="color:${n.color};border-color:${n.color}33;background:${n.color}11">
      <span class="chip-dot" style="background:${n.color}"></span>${n.name}</span>`).join('');
  const tl = (r.timeline || []).map(t =>
    `<div class="tl-item"><span class="tl-date">${t.date}</span><span class="tl-event">${t.event}</span></div>`).join('');
  const srcs = (r.sources || []).map(s =>
    `<a class="source-link" href="${s.url}" target="_blank">🔗 ${s.label}</a>`).join('');
  let html = `<div class="person-chips">${chips}</div>`;
  if (r.desc) html += `<div class="section-title">🔍 관계 설명</div><div class="relation-block"><p>${r.desc}</p></div>`;
  if (tl)    html += `<div class="section-title">📅 타임라인</div><div class="relation-block">${tl}</div>`;
  if (srcs)  html += `<div class="section-title">📰 출처</div><div class="source-list" style="margin-top:0">${srcs}</div>`;
  panelBody.innerHTML = html;
  openPanel();
}

// ── 툴팁
const tip = document.getElementById('tooltip');
function showTip(e, html) {
  const rect = cont.getBoundingClientRect();
  tip.innerHTML = html;
  tip.style.opacity = 1;
  tip.style.left = (e.clientX - rect.left + 14) + 'px';
  tip.style.top  = (e.clientY - rect.top  - 10) + 'px';
}
function hideTip() { tip.style.opacity = 0; }

// ═══════════════════════════════════════════
// 4. 하이라이트 로직 (hover 기반)
// ═══════════════════════════════════════════
let linkPathsSel, linkHitsSel, linkLabelsSel, nodeGroupsSel;
let selectedNodeId = null;
const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

function getConnectedNodeIds(nodeId) {
  const connected = new Set([nodeId]);
  LINKS.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === nodeId) connected.add(t);
    if (t === nodeId) connected.add(s);
  });
  return connected;
}

function applyHighlight(nodeId) {
  selectedNodeId = nodeId;
  const conn = getConnectedNodeIds(nodeId);
  nodeGroupsSel.style('opacity', d => conn.has(d.id) ? 1 : 0.1);
  linkPathsSel.attr('stroke-opacity', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (conn.has(s) && conn.has(t)) ? 0.85 : 0.04;
  });
  linkHitsSel.style('pointer-events', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (conn.has(s) && conn.has(t)) ? 'all' : 'none';
  });
  const lOpacity = currentK >= LINK_THRESH ? Math.min(1, (currentK - LINK_THRESH) * 7) : 0;
  linkLabelsSel.style('opacity', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (conn.has(s) && conn.has(t)) ? lOpacity : 0;
  });
}

function clearHighlight() {
  if (!selectedNodeId) return;
  selectedNodeId = null;
  if (!nodeGroupsSel) return;
  nodeGroupsSel.style('opacity', 1);
  linkPathsSel.attr('stroke-opacity', .55);
  linkHitsSel.style('pointer-events', 'all');
  updateLabelVisibility(currentK);
}

// ═══════════════════════════════════════════
// 5. 그래프 빌드
// ═══════════════════════════════════════════
function buildGraph() {
  root.selectAll('*').remove();
  defs.selectAll('linearGradient').remove();
  LINKS.forEach((l, i) => addGradient(i, l.color));

  const lg = root.append('g');
  linkPathsSel = lg.selectAll('path.lp').data(LINKS).join('path').attr('class','lp')
    .attr('fill','none')
    .attr('stroke', (d, i) => `url(#lg-${i})`)
    .attr('stroke-width', d => d.type === 'rebel' ? 2.8 : 1.8)
    .attr('stroke-opacity', .55)
    .attr('stroke-dasharray', d => d.dash || 'none')
    .style('cursor','pointer')
    .on('click', (e, d) => { e.stopPropagation(); showRelationPanel(d); })
    .on('mouseenter', function(e, d) {
      d3.select(this).attr('stroke-opacity', 1).attr('stroke-width', d.type === 'rebel' ? 5 : 3.5);
      showTip(e, `<strong style="color:${d.color}">${d.label || '관계'}</strong><br><span style="color:#6e7681;font-size:10px">클릭 → 관계 상세</span>`);
    })
    .on('mouseleave', function(e, d) {
      const s = typeof d.source === 'object' ? d.source.id : d.source;
      const t = typeof d.target === 'object' ? d.target.id : d.target;
      const isActive = selectedNodeId && (s === selectedNodeId || t === selectedNodeId);
      d3.select(this)
        .attr('stroke-opacity', isActive ? 0.85 : .55)
        .attr('stroke-width', d.type === 'rebel' ? 2.8 : 1.8);
      hideTip();
    });

  linkHitsSel = lg.selectAll('path.lh').data(LINKS).join('path').attr('class','lh')
    .attr('fill','none').attr('stroke','transparent').attr('stroke-width', 20)
    .style('cursor','pointer')
    .on('click', (e, d) => { e.stopPropagation(); showRelationPanel(d); });

  linkLabelsSel = root.append('g').selectAll('text').data(LINKS).join('text')
    .attr('class','link-label')
    .style('font-size','9.5px').style('fill','#6e7681').style('text-anchor','middle')
    .style('pointer-events','none').style('opacity', 0)
    .text(d => d.label || '');

  nodeGroupsSel = root.append('g').selectAll('g.ng').data(NODES).join('g').attr('class','ng')
    .style('cursor','pointer')
    .on('click', (e, d) => { e.stopPropagation(); showPersonPanel(d); })
    .on('mouseenter', (e, d) => {
      if (!isTouch) applyHighlight(d.id);
      showTip(e, `<strong style="color:${d.color}">${d.name}</strong><br>
       <span style="color:#8b949e;font-size:10px">${d.role}</span><br>
       <span style="color:#484f58;font-size:9.5px">연결 ${d._degree}명</span>`);
    })
    .on('mouseleave', () => { if (!isTouch) { clearHighlight(); hideTip(); } else { hideTip(); } })
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

  nodeGroupsSel.append('circle')
    .attr('r', d => d.size + 14).attr('fill','none')
    .attr('stroke', d => d.color).attr('stroke-width', 1).attr('stroke-opacity', .18)
    .attr('filter', d => `url(#glow-${d.id})`);

  nodeGroupsSel.append('circle').attr('class','node-circle')
    .attr('r', d => d.size)
    .attr('fill', d => `${d.color}18`).attr('stroke', d => d.color)
    .attr('stroke-width', d => d.size > 40 ? 2.5 : 1.8)
    .on('mouseenter', function(){ d3.select(this).attr('fill', d => `${d.color}35`); })
    .on('mouseleave', function(){ d3.select(this).attr('fill', d => `${d.color}18`); });

  nodeGroupsSel.append('circle')
    .attr('r', d => d.size - 8).attr('fill','none')
    .attr('stroke', d => d.color).attr('stroke-width', .5).attr('stroke-opacity', .25);

  nodeGroupsSel.append('text').attr('class','node-label')
    .style('font-weight','700').style('fill','#f0f6fc').style('text-anchor','middle')
    .style('pointer-events','none')
    .attr('dy', d => d.size > 42 ? '-6' : d.size > 32 ? '-4' : '-3')
    .style('font-size', d => d.size > 42 ? '12px' : d.size > 32 ? '10.5px' : '9px')
    .text(d => d.name);

  nodeGroupsSel.append('text').attr('class','node-sublabel')
    .style('fill','#8b949e').style('text-anchor','middle').style('pointer-events','none')
    .style('opacity', 0)
    .attr('dy', d => d.size > 42 ? '8' : d.size > 32 ? '7' : '6')
    .style('font-size', d => d.size > 42 ? '9px' : '8px')
    .text(d => d.role);

  nodeGroupsSel.filter(d => d.size > 30).append('text').attr('class','node-period')
    .style('fill','#484f58').style('text-anchor','middle').style('pointer-events','none')
    .style('opacity', 0)
    .attr('dy', d => d.size > 42 ? '20' : '18')
    .style('font-size','7.5px')
    .text(d => d.period);

  updateLabelVisibility(currentK);
}

buildGraph();

// ═══════════════════════════════════════════
// 6. 시뮬레이션
// ═══════════════════════════════════════════
const sim = d3.forceSimulation(NODES)
  .force('link', d3.forceLink(LINKS).id(d => d.id)
    .distance(d => d.distance || 185).strength(.45))
  .force('charge', d3.forceManyBody().strength(-550))
  .force('center', d3.forceCenter(W / 2, H / 2).strength(.02))
  .force('collision', d3.forceCollide(d => (d.size || 28) + 24))
  .force('x', d3.forceX(d => d.ix ? d.ix * W : W / 2).strength(.07))
  .force('y', d3.forceY(d => d.iy ? d.iy * H : H / 2).strength(.07))
  .alphaDecay(.025)
  .velocityDecay(.42);

function curvePath(d) {
  if (!d.source || d.source.x == null) return '';
  const sx = d.source.x, sy = d.source.y;
  const tx = d.target.x, ty = d.target.y;
  const mx = (sx + tx) / 2, my = (sy + ty) / 2;
  const dx = tx - sx, dy = ty - sy;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const c = Math.min(len * .15, 48);
  const nx = -dy / len * c, ny = dx / len * c;
  return `M${sx} ${sy} Q${mx + nx} ${my + ny} ${tx} ${ty}`;
}

sim.on('tick', () => {
  LINKS.forEach((d, i) => {
    if (d.source && d.source.x != null) {
      defs.select(`#lg-${i}`)
        .attr('x1', d.source.x).attr('y1', d.source.y)
        .attr('x2', d.target.x).attr('y2', d.target.y);
    }
  });
  linkPathsSel.attr('d', curvePath);
  linkHitsSel.attr('d', curvePath);
  linkLabelsSel.attr('transform', d => {
    if (!d.source || d.source.x == null) return '';
    const mx = (d.source.x + d.target.x) / 2;
    const my = (d.source.y + d.target.y) / 2;
    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    return `translate(${mx - dy / len * 13},${my + dx / len * 13})`;
  });
  nodeGroupsSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

let fitted = false;
sim.on('end', () => { if (!fitted) { fitted = true; fitGraph(); } });
setTimeout(() => { if (!fitted) { fitted = true; fitGraph(); } }, 3500);

window.addEventListener('resize', () => {
  setAppHeight();
  W = cont.clientWidth; H = cont.clientHeight;
  sim.force('center', d3.forceCenter(W / 2, H / 2)).alpha(.2).restart();
});

window.addEventListener('orientationchange', () => {
  setTimeout(() => { setAppHeight(); W = cont.clientWidth; H = cont.clientHeight; fitGraph(); }, 300);
});

svg.on('click', () => { clearHighlight(); closePanel(); });

// ═══════════════════════════════════════════
// 7. 줌 버튼
// ═══════════════════════════════════════════
document.getElementById('zoom-in').addEventListener('click', () =>
  svg.transition().duration(250).call(zoomBehavior.scaleBy, 1.5));
document.getElementById('zoom-out').addEventListener('click', () =>
  svg.transition().duration(250).call(zoomBehavior.scaleBy, 1 / 1.5));
document.getElementById('zoom-fit').addEventListener('click', fitGraph);

// ═══════════════════════════════════════════
// 8. 기사 분석 패널
// ═══════════════════════════════════════════
const articleBtn   = document.getElementById('article-btn');
const articlePanel = document.getElementById('article-panel');
const apClose      = document.getElementById('ap-close');
const analyzeBtn   = document.getElementById('analyze-btn');
const apResult     = document.getElementById('ap-result');
const apPersonList = document.getElementById('ap-person-list');
const apAddBtn     = document.getElementById('ap-add-btn');
const apMsg        = document.getElementById('ap-msg');
const urlInput     = document.getElementById('url-input');
const textInput    = document.getElementById('text-input');
let currentTab = 'url', foundPeople = [];

articleBtn.addEventListener('click', () => articlePanel.classList.toggle('open'));
apClose.addEventListener('click',    () => articlePanel.classList.remove('open'));

document.querySelectorAll('.ap-tab').forEach(t => t.addEventListener('click', function() {
  currentTab = this.dataset.tab;
  document.querySelectorAll('.ap-tab').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  document.getElementById('tab-url').style.display  = currentTab === 'url'  ? 'block' : 'none';
  document.getElementById('tab-text').style.display = currentTab === 'text' ? 'block' : 'none';
}));

analyzeBtn.addEventListener('click', async () => {
  apMsg.className = 'ap-msg'; apMsg.style.display = 'none';
  apResult.style.display = 'none';
  analyzeBtn.disabled = true; analyzeBtn.textContent = '⏳ 분석 중...';
  let text = '';
  try {
    if (currentTab === 'url') {
      const url = urlInput.value.trim();
      if (!url) throw new Error('URL을 입력하세요');
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) throw new Error('기사를 가져올 수 없습니다. 텍스트 붙여넣기를 이용해 주세요.');
      const data = await res.json();
      const tmp = document.createElement('div'); tmp.innerHTML = data.contents || '';
      text = tmp.innerText || tmp.textContent || '';
    } else {
      text = textInput.value.trim();
      if (!text) throw new Error('기사 텍스트를 붙여넣으세요');
    }
    foundPeople = POLITICIAN_DB.filter(p => text.includes(p.name));
    if (!foundPeople.length) throw new Error('인식된 정치인이 없습니다. 더 많은 기사 내용을 붙여넣어 보세요.');
    renderFoundPeople();
  } catch (e) {
    apMsg.textContent = '❌ ' + e.message;
    apMsg.className = 'ap-msg err'; apMsg.style.display = 'block';
  } finally {
    analyzeBtn.disabled = false; analyzeBtn.textContent = '🔍 인물 분석하기';
  }
});

function renderFoundPeople() {
  apPersonList.innerHTML = '';
  foundPeople.forEach((p, i) => {
    const inGraph = NODES.find(n => n.id === p.id);
    const div = document.createElement('label');
    div.className = 'ap-person-item';
    div.innerHTML = `<input type="checkbox" data-idx="${i}" ${inGraph ? 'checked disabled' : 'checked'}>
      <span class="ap-person-dot" style="background:${p.color}"></span>
      <span class="ap-person-name">${p.name}</span>
      <span class="ap-person-tag ${inGraph ? '' : 'new-tag'}">${inGraph ? '이미 있음' : '새 인물'}</span>`;
    apPersonList.appendChild(div);
  });
  apResult.style.display = 'block';
}

apAddBtn.addEventListener('click', () => {
  const checked = [...document.querySelectorAll('#ap-person-list input:checked:not(:disabled)')]
    .map(c => foundPeople[+c.dataset.idx]);
  const srcUrl = currentTab === 'url' ? urlInput.value.trim() : '(텍스트 입력)';
  const added = [];

  checked.forEach(p => {
    if (NODES.find(n => n.id === p.id)) return;
    const posAngle = (NODES.length % 12) * (Math.PI * 2 / 12);
    const newNode = {
      id: p.id, name: p.name, color: p.color,
      role: p.role || '추가된 인물', period: p.period || '기사 기반 추가',
      group: 'added',
      ix: 0.5 + Math.cos(posAngle) * 0.3,
      iy: 0.5 + Math.sin(posAngle) * 0.3,
      x: W / 2 + Math.cos(posAngle) * 200,
      y: H / 2 + Math.sin(posAngle) * 200,
      _degree: 1, size: 28,
      events: (p.events || []).map(e => ({
        ...e, sources: [...(e.sources||[]), { label:"기사 출처", url:srcUrl }]
      }))
    };
    NODES.push(newNode);
    (p.mainLinks || []).forEach(ml => {
      if (NODES.find(n => n.id === ml.target)) {
        LINKS.push({
          source: newNode.id, target: ml.target,
          type: ml.type || 'support', color: ml.color || '#6e7681',
          label: ml.label || '관계', distance: 180,
          relation: { desc:'기사 기반으로 추가된 연결.', sources:[{ label:"기사", url:srcUrl }] }
        });
      }
    });
    calcDegrees();
    addGlow(newNode.id, 6);
    added.push(p.name);
  });

  if (!added.length) {
    apMsg.textContent = '추가할 새 인물이 없습니다.';
    apMsg.className = 'ap-msg'; apMsg.style.display = 'block';
    return;
  }

  buildGraph();
  sim.nodes(NODES);
  sim.force('link', d3.forceLink(LINKS).id(d => d.id).distance(d => d.distance || 185).strength(.45));
  sim.alpha(.6).restart();

  apMsg.textContent = `✅ ${added.join(', ')} 추가 완료!`;
  apMsg.className = 'ap-msg'; apMsg.style.display = 'block';
  apMsg.style.background = '#1a3d2b'; apMsg.style.color = '#4ade80'; apMsg.style.border = '1px solid #238636';
  setTimeout(() => articlePanel.classList.remove('open'), 1500);
});
</script>
